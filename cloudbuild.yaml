steps:
  - name: 'gcr.io/cloud-builders/docker'
    secretEnv: ['NUXT_UI_PRO_LICENSE']
    args:
      [
        'build',
        '-t',
        'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/markit',
        '--build-arg',
        'NUXT_UI_PRO_LICENSE=$$NUXT_UI_PRO_LICENSE',
        '.'
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - markit
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/markit
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/markit'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NUXT_UI_PRO_LICENSE/versions/latest
      env: 'NUXT_UI_PRO_LICENSE'
